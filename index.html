/* ── Puzzle logic ── */
function goalState(n){const g=[];for(let i=1;i<n*n;i++)g.push(i);g.push(0);return g;}
function isSolved(t){const n=Math.round(Math.sqrt(t.length));return goalState(n).every((v,i)=>v===t[i]);}
function isSolvable(t,n){
  let inv=0;const arr=t.filter(x=>x!==0);
  for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++)if(arr[i]>arr[j])inv++;
  if(n%2===1)return inv%2===0;
  const row=Math.floor(t.indexOf(0)/n),rfb=n-1-row;
  return(inv+rfb)%2===0;
}
function shuffleTiles(n){
  let t;
  do{
    t=Array.from({length:n*n},(_,i)=>i);
    for(let i=t.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[t[i],t[j]]=[t[j],t[i]];}
  }while(!isSolvable(t,n)||isSolved(t));
  return t;
}
function manhattan(t,n){
  let d=0;
  t.forEach((v,i)=>{if(!v)return;const gr=Math.floor((v-1)/n),gc=(v-1)%n,cr=Math.floor(i/n),cc=i%n;d+=Math.abs(gr-cr)+Math.abs(gc-cc);});
  return d;
}
function getNeighbors(t,n){
  const e=t.indexOf(0),er=Math.floor(e/n),ec=e%n,out=[];
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    const nr=er+dr,nc=ec+dc;
    if(nr<0||nr>=n||nc<0||nc>=n)return;
    const ni=nr*n+nc,nt=[...t];[nt[e],nt[ni]]=[nt[ni],nt[e]];
    out.push({state:nt,moved:ni});
  });
  return out;
}
function astar(start,n){
  if(n>3)return null;
  const goal=goalState(n).join(','),open=new Map(),key=start.join(',');
  open.set(key,{t:start,g:0,f:manhattan(start,n),path:[]});
  const closed=new Set();
  for(let iter=0;iter<250000;iter++){
    if(!open.size)return null;
    let best=null,bestF=Infinity;
    for(const[k,v]of open)if(v.f<bestF){bestF=v.f;best=k;}
    const cur=open.get(best);open.delete(best);
    if(best===goal)return cur.path;
    closed.add(best);
    for(const nb of getNeighbors(cur.t,n)){
      const nk=nb.state.join(',');if(closed.has(nk))continue;
      const g=cur.g+1,h=manhattan(nb.state,n);
      if(!open.has(nk)||open.get(nk).g>g)
        open.set(nk,{t:nb.state,g,f:g+h,path:[...cur.path,nb.moved]});
    }
  }
  return null;
}
function fmtTime(s){const m=Math.floor(s/60);return`${m}:${String(s%60).padStart(2,'0')}`;}
function scoreCalc(steps,sec,size,mode){
  const base = mode==="numbers" ? (size===3?1000:2500) : (size===3?1200:3000);
  return Math.max(0,Math.round(base-steps*5-sec*2));
}
function rankColor(i){return i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"#e0e0e0";}

async function fetchRemote(){
  if(!JSONBIN_ID||!JSONBIN_KEY)return null;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{"X-Master-Key":JSONBIN_KEY}});
    const d=await r.json();return d.record?.leaderboard||[];
  }catch(e){return null;}
}
async function pushRemote(board){
  if(!JSONBIN_ID||!JSONBIN_KEY)return;
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},
      body:JSON.stringify({leaderboard:board})
    });
  }catch(e){}
}
function mergeBoards(a,b){
  const map=new Map();
  [...a,...b].forEach(e=>{const k=`${e.name}|${e.score}|${e.date}|${e.mode}`;if(!map.has(k))map.set(k,e);});
  return[...map.values()].sort((a,b)=>b.score-a.score).slice(0,100);
}

/* ══════════ Tile rendering ══════════
   FIXED: previous version mixed up cat.image||SCHOOL_LOGO as a fallback
   for every picture type, which made plant/animal sometimes try to load
   the logo image. Now dispatches strictly on cat.kind. */
function TileImage({cat, val, boardSize}){
  if(!cat) return null; // numbers mode handled by caller

  if(cat.kind==="alphabet"){
    const letter = val===0 ? null : cat.letters[val-1];
    return letter ? (
      <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:cat.color+"22"}}>
        <span style={{fontSize:"clamp(22px,9vw,46px)",fontFamily:"Georgia",fontWeight:"bold",color:cat.color}}>{letter}</span>
      </div>
    ) : null;
  }

  // shared crop math for image & svg tiles
  const idx = val-1; // 0-based position in the SOLVED layout
  const col = idx % boardSize;
  const row = Math.floor(idx / boardSize);

  if(cat.kind==="image"){
    return(
      <div style={{width:"100%",height:"100%",overflow:"hidden",position:"relative",background:"#fff"}}>
        <img
          src={cat.image}
          draggable={false}
          style={{
            position:"absolute",
            width:`${boardSize*100}%`,
            height:`${boardSize*100}%`,
            left:`${-col*100}%`,
            top:`${-row*100}%`,
            maxWidth:"none",
            maxHeight:"none",
            userSelect:"none",
            pointerEvents:"none",
          }}
        />
      </div>
    );
  }

  if(cat.kind==="svg"){
    return(
      <div style={{width:"100%",height:"100%",overflow:"hidden",position:"relative"}}>
        <div style={{
          position:"absolute",
          width:`${boardSize*100}%`,
          height:`${boardSize*100}%`,
          left:`${-col*100}%`,
          top:`${-row*100}%`,
        }}>
          {cat.svgType==="plant" ? <PlantSVG/> : <AnimalSVG/>}
        </div>
      </div>
    );
  }
  return null;
}

/* ══════════ Solved-state preview ══════════ */
function SolvedPreview({mode, cat, size, px=110}){
  const n = mode==="numbers" ? size : cat.size;
  const cells = Array.from({length:n*n},(_,i)=>i);
  return(
    <div style={{display:"grid",gridTemplateColumns:`repeat(${n},1fr)`,gap:2,width:px,height:px,borderRadius:8,overflow:"hidden",border:`2px solid ${C.gold}`,flexShrink:0}}>
      {cells.map(i=>{
        const val = i<n*n-1 ? i+1 : 0;
        return(
          <div key={i} style={{width:"100%",height:"100%",background:val===0?C.dark:"#fff",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {val>0 && (mode==="numbers"
              ? <span style={{fontSize:px/n*0.4,fontWeight:"bold",fontFamily:"Georgia",color:C.text}}>{val}</span>
              : <TileImage cat={cat} val={val} boardSize={n}/>)}
          </div>
        );
      })}
    </div>
  );
}

function App(){

  const [nameInput,setNameInput] = useState("");
  const [roleInput,setRoleInput] = useState("Pupil");
  const [classInput,setClassInput] = useState("Primary 1");
  const [gameMode,setGameMode]   = useState("numbers"); // numbers|picture
  const [picCat,setPicCat]       = useState(PICTURE_CATS[0]);
  const [size,setSize]           = useState(3);
  const [tiles,setTiles]         = useState([]);
  const [steps,setSteps]         = useState(0);
  const [sec,setSec]             = useState(0);
  const [running,setRunning]     = useState(false);
  const [leaderboard,setLeaderboard] = useState([]);
  const [lastResult,setLastResult] = useState(null);
  const [movingIdx,setMovingIdx] = useState(null);
  const [tab,setTab]             = useState("all");
  const [modeTab,setModeTab]     = useState("all");
  const [showGoal,setShowGoal]   = useState(false);
  const [syncing,setSyncing]     = useState(false);
  const timerRef = useRef(null);

  useEffect(()=>{
    const local=JSON.parse(localStorage.getItem(LS_KEY)||"[]");
    setLeaderboard(local);
    fetchRemote().then(remote=>{
      if(!remote)return;
      const merged=mergeBoards(local,remote);
      setLeaderboard(merged);
      localStorage.setItem(LS_KEY,JSON.stringify(merged));
    });
  },[]);

  async function saveBoard(board){
    setLeaderboard(board);
    localStorage.setItem(LS_KEY,JSON.stringify(board));
    setSyncing(true);
    await pushRemote(board);
    setSyncing(false);
  }

  useEffect(()=>{
    if(running){timerRef.current=setInterval(()=>setSec(s=>s+1),1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);

  /* mode: "numbers" or "picture". cat: a PICTURE_CATS entry (only used for picture mode). sz: optional override for numbers mode */
  function startGame(mode, cat, sz){
    const n = mode==="numbers" ? (sz||size) : cat.size;
    const t = shuffleTiles(n);
    setTiles(t);setSteps(0);setSec(0);setRunning(true);setShowGoal(false);
    setGameMode(mode);
    if(mode==="picture") setPicCat(cat);
    setSize(n);
    setScreen("game");
  }

  function tryMove(idx){
    if(showGoal) return;
    const empty=tiles.indexOf(0);
    const er=Math.floor(empty/size),ec=empty%size;
    const r=Math.floor(idx/size),c=idx%size;
    if(!((r===er&&Math.abs(c-ec)===1)||(c===ec&&Math.abs(r-er)===1)))return;
    setMovingIdx(idx);setTimeout(()=>setMovingIdx(null),160);
    const nt=[...tiles];[nt[idx],nt[empty]]=[nt[empty],nt[idx]];
    const ns=steps+1;setSteps(ns);setTiles(nt);
    if(isSolved(nt)){
      setRunning(false);
      const sc=scoreCalc(ns,sec,size,gameMode);
      const modeLabel = gameMode==="picture" ? `Picture – ${picCat.label}` : "Numbers";
      const result={name:player.name,role:player.role,cls:player.cls,steps:ns,time:sec,score:sc,size,mode:modeLabel,date:new Date().toLocaleDateString()};
      setLastResult(result);
      saveBoard(mergeBoards([result],leaderboard));
      setScreen("win");
    }
  }

  function doHint(){
    const path=astar(tiles,size);
    if(path&&path.length>0)tryMove(path[0]);
  }

    if(gameMode==="numbers") startGame("numbers",null,size);

              {[3,4].map(s=>(
                <button key={s} onClick={()=>setSize(s)}
                  style={{flex:1,padding:"10px 0",borderRadius:10,border:`2px solid ${size===s?C.gold:"rgba(255,255,255,.3)"}`,background:size===s?C.goldL:"rgba(255,255,255,.08)",color:size===s?C.text:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>
                  {s}×{s} <span style={{fontSize:10,fontWeight:"normal"}}>({s===3?"Easy":"Hard"})</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Preview */}
        <div style={{background:"rgba(255,255,255,.1)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,.2)",display:"flex",alignItems:"center",gap:12}}>
          <SolvedPreview mode={gameMode} cat={picCat} size={size} px={84}/>
          <div>
            <div style={{fontSize:12,fontWeight:"bold",color:"#fff"}}>Goal — solved state</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.6)",marginTop:3,lineHeight:1.5}}>Rearrange the tiles to match this picture</div>
          </div>
        </div>

        <button onClick={()=>{
          if(!nameInput.trim())return;
          setPlayer({name:nameInput.trim(),role:roleInput,cls:classInput});
          if(gameMode==="numbers") startGame("numbers",null,size);
          else startGame("picture",picCat);
        }} disabled={!nameInput.trim()}
          style={{background:nameInput.trim()?`linear-gradient(135deg,${C.maroon},${C.navy})`:"#999",color:"#fff",border:"none",borderRadius:12,padding:"16px",fontSize:18,fontWeight:"bold",cursor:nameInput.trim()?"pointer":"not-allowed",fontFamily:"Georgia",boxShadow:nameInput.trim()?"0 4px 16px rgba(0,0,0,.4)":"none"}}>
          🎮 Start Puzzle
        </button>
      </div>
    </div>
  );

  /* ════════════ GAME SCREEN ════════════ */
  if(screen==="game"){
    const modeLabel = gameMode==="picture" ? `${picCat.emoji} ${picCat.label}` : "🔢 Numbers";
    return(
    <div style={{minHeight:"100vh",background:C.bg,backgroundImage:BG,display:"flex",flexDirection:"column",alignItems:"center"}}>
      {/* Top bar */}
      <div style={{width:"100%",maxWidth:480,background:`linear-gradient(135deg,${C.maroon},${C.navy})`,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px"}}>
        <button onClick={()=>{setRunning(false);setScreen("home");}} style={{width:42,height:42,borderRadius:"50%",border:"none",background:`radial-gradient(circle at 35% 35%,${C.woodL},${C.woodD})`,cursor:"pointer",fontSize:18,boxShadow:"inset 0 -2px 5px rgba(0,0,0,.4)"}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{color:"#fff",fontWeight:"bold",fontSize:14,fontFamily:"Georgia"}}>{SCHOOL_NAME}</div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>{modeLabel} · {size}×{size}</div>
        </div>
        <button onClick={()=>{setRunning(false);setScreen("board");}} style={{width:42,height:42,borderRadius:"50%",border:"none",background:`radial-gradient(circle at 35% 35%,${C.woodL},${C.woodD})`,cursor:"pointer",fontSize:16,boxShadow:"inset 0 -2px 5px rgba(0,0,0,.4)"}}>🏆</button>
      </div>

      {/* Stats */}
      <div style={{width:"100%",maxWidth:480,display:"flex",justifyContent:"space-between",padding:"8px 12px",gap:8}}>
        <div style={{background:C.red,color:C.gold,fontWeight:"bold",fontSize:14,padding:"6px 12px",borderRadius:8,border:"2px solid #9A0000"}}>Steps: {steps}</div>
        <div style={{background:"#1a1a1a",color:C.gold,fontWeight:"bold",fontSize:14,padding:"6px 12px",borderRadius:8,border:"2px solid #333"}}>⏱ {fmtTime(sec)}</div>
        <div style={{background:C.navy,color:"#fff",fontSize:13,padding:"6px 12px",borderRadius:8,fontWeight:"bold"}}>⭐ {scoreCalc(steps,sec,size,gameMode)}</div>
      </div>

      {/* Player tags */}
      <div style={{width:"100%",maxWidth:480,padding:"0 12px 4px",display:"flex",gap:6,flexWrap:"wrap"}}>
        <span style={pill(C.navyL,C.navy)}>{player?.name}</span>
        <span style={pill(C.goldL,C.text)}>{player?.cls}</span>
        <span style={pill(C.purpleL,C.purple)}>{player?.role}</span>
      </div>

      {/* Goal overlay */}
      {showGoal && (
        <div onClick={()=>setShowGoal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:"20px",textAlign:"center",maxWidth:300,width:"100%"}}>
            <div style={{fontWeight:"bold",fontSize:16,color:C.text,marginBottom:4}}>🎯 Goal — solve to this</div>
            <div style={{fontSize:12,color:"#888",marginBottom:14}}>Tap anywhere to close</div>
            <div style={{display:"flex",justifyContent:"center"}}>
              <SolvedPreview mode={gameMode} cat={picCat} size={size} px={220}/>
            </div>
          </div>
        </div>
      )}

      {/* Board */}
      <div style={{padding:"4px 10px 10px",width:"100%",maxWidth:480,display:"flex",justifyContent:"center"}}>
        <div style={{background:C.dark,border:`4px solid ${C.gold}`,borderRadius:18,
          boxShadow:"0 6px 24px rgba(0,0,0,.5),inset 0 0 12px rgba(0,0,0,.6)",
          padding:gameMode==="numbers"?8:4,
          display:"grid",gridTemplateColumns:`repeat(${size},1fr)`,
          gap:gameMode==="numbers"?6:3,
          width:`min(${size*108}px,94vw)`,height:`min(${size*108}px,94vw)`}}>
          {tiles.map((val,idx)=>{
            const isEmpty=val===0;
            return(
              <div key={idx} onClick={()=>!isEmpty&&tryMove(idx)}
                style={{borderRadius:gameMode==="numbers"?12:4,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:isEmpty?"default":"pointer",
                  transition:"transform .12s",
                  transform:movingIdx===idx?"scale(0.90)":"scale(1)",
                  overflow:"hidden",
                  background:isEmpty?C.dark:(gameMode==="numbers"?`repeating-linear-gradient(105deg,transparent,transparent 6px,rgba(255,255,255,.06) 6px,rgba(255,255,255,.06) 7px),radial-gradient(ellipse at 30% 30%,${C.woodL} 0%,${C.woodM} 60%,${C.woodM} 100%)`:"transparent"),
                  boxShadow:isEmpty?"inset 0 4px 12px rgba(0,0,0,.8)":"2px 3px 8px rgba(0,0,0,.4)",
                  outline:isEmpty?"none":"1px solid rgba(255,255,255,.15)",
                  position:"relative",
                }}>
                {!isEmpty && gameMode==="numbers" && (
                  <React.Fragment>
                    <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,rgba(255,255,255,.22) 0%,transparent 55%)"}}/>
                    <span style={{fontSize:`clamp(${size===3?22:16}px,${size===3?8:6}vw,${size===3?46:34}px)`,fontWeight:"bold",fontFamily:"Georgia",color:C.text,position:"relative",zIndex:1}}>{val}</span>
                  </React.Fragment>
                )}
                {!isEmpty && gameMode==="picture" && <TileImage cat={picCat} val={val} boardSize={size}/>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,padding:"0 14px 12px",width:"100%",maxWidth:480}}>
        <button onClick={newGame} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.maroon},${C.navy})`,color:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>🔀 New</button>
        {size===3 && gameMode==="numbers" && <button onClick={doHint} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.woodL},${C.woodM})`,color:C.text,fontWeight:"bold",fontSize:14,cursor:"pointer"}}>💡 Hint</button>}
        <button onClick={()=>setShowGoal(true)} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#333",color:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>👁 Goal</button>
      </div>
    </div>
    );
  }

  /* ════════════ WIN SCREEN ════════════ */
  if(screen==="win" && lastResult){
    const rank=leaderboard.findIndex(e=>e.name===lastResult.name&&e.score===lastResult.score)+1;
    return(
      <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${C.maroon},${C.navy})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:14}}>
        <div className="win-anim" style={{background:"#fff",borderRadius:20,padding:"22px 18px",maxWidth:420,width:"100%",boxShadow:"0 12px 40px rgba(0,0,0,.4)",textAlign:"center"}}>
          <div style={{fontSize:50,marginBottom:4}}>🏆</div>
          <div style={{fontFamily:"Georgia",fontSize:24,fontWeight:"bold",color:C.text,marginBottom:2}}>Puzzle Solved!</div>
          <div style={{color:"#888",fontSize:12,marginBottom:4}}>{SCHOOL_NAME}</div>
          <div style={{fontSize:13,color:C.maroon,fontWeight:"bold",marginBottom:14}}>{lastResult.mode}</div>

          <div style={{background:C.goldL,borderRadius:12,padding:"12px",marginBottom:12}}>
            <div style={{fontSize:32,fontWeight:"bold",color:C.gold,fontFamily:"Georgia"}}>{lastResult.score} pts</div>
            <div style={{fontSize:11,color:"#888"}}>Your Score</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
            {[["🔢","Steps",lastResult.steps],["⏱","Time",fmtTime(lastResult.time)],["🎮","Grid",`${lastResult.size}×${lastResult.size}`]].map(([ic,lb,val])=>(
              <div key={lb} style={{background:C.navyL,borderRadius:8,padding:"8px 4px"}}>
                <div style={{fontSize:16}}>{ic}</div>
                <div style={{fontWeight:"bold",fontSize:14,color:C.navy}}>{val}</div>
                <div style={{fontSize:10,color:"#888"}}>{lb}</div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:12,flexWrap:"wrap"}}>
            <span style={pill(C.navyL,C.navy)}>{lastResult.name}</span>
            <span style={pill(C.goldL,C.text)}>{lastResult.cls}</span>
            <span style={pill(C.purpleL,C.purple)}>{lastResult.role}</span>
            <span style={pill(C.greenL,C.green)}>🏅 Rank #{rank}</span>
          </div>

          {syncing && <div style={{fontSize:11,color:C.navy,marginBottom:6}}>⏳ Syncing scores…</div>}

          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#888",marginBottom:6}}>Share your result</div>
            <div style={{display:"flex",gap:7,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={shareWhatsApp} style={{padding:"9px 12px",borderRadius:8,border:"none",background:"#25D366",color:"#fff",fontWeight:"bold",fontSize:12,cursor:"pointer"}}>📱 WhatsApp</button>
              <button onClick={shareFacebook} style={{padding:"9px 12px",borderRadius:8,border:"none",background:"#1877F2",color:"#fff",fontWeight:"bold",fontSize:12,cursor:"pointer"}}>📘 Facebook</button>
              <button onClick={downloadImage} style={{padding:"9px 12px",borderRadius:8,border:"none",background:"#333",color:"#fff",fontWeight:"bold",fontSize:12,cursor:"pointer"}}>⬇ Image</button>
            </div>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={newGame} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.maroon},${C.navy})`,color:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>🎮 Again</button>
            <button onClick={()=>setScreen("home")} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.woodL},${C.woodM})`,color:C.text,fontWeight:"bold",fontSize:14,cursor:"pointer"}}>🏠 Home</button>
            <button onClick={()=>setScreen("board")} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.green},#1B5E20)`,color:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>🏆 Board</button>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════ LEADERBOARD SCREEN ════════════ */
  if(screen==="board") return(
    <div style={{minHeight:"100vh",background:C.bg,backgroundImage:BG,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{width:"100%",maxWidth:480,background:`linear-gradient(135deg,${C.maroon},${C.navy})`,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setScreen(lastResult?"win":"home")} style={{width:40,height:40,borderRadius:"50%",border:"none",background:`radial-gradient(circle at 35% 35%,${C.woodL},${C.woodD})`,cursor:"pointer",fontSize:18,boxShadow:"inset 0 -2px 5px rgba(0,0,0,.4)"}}>←</button>
        <div>
          <div style={{color:"#fff",fontWeight:"bold",fontSize:16,fontFamily:"Georgia"}}>🏆 Leaderboard</div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>{SCHOOL_NAME}</div>
        </div>
        <button onClick={()=>setScreen("home")} style={{marginLeft:"auto",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:"bold"}}>🎮 Play</button>
      </div>

      {/* Mode tabs */}
      <div style={{width:"100%",maxWidth:480,padding:"8px 12px 0",display:"flex",gap:6}}>
        {[["all","All Modes"],["numbers","🔢 Numbers"],["picture","🖼️ Picture"]].map(([id,label])=>(
          <button key={id} onClick={()=>setModeTab(id)}
            style={{flex:1,padding:"6px 4px",borderRadius:16,border:"none",background:modeTab===id?C.navy:"rgba(255,255,255,.5)",color:modeTab===id?"#fff":"#444",fontWeight:modeTab===id?"bold":"normal",fontSize:11,cursor:"pointer"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Role tabs */}
      <div style={{width:"100%",maxWidth:480,display:"flex",padding:"8px 12px 0",gap:6}}>
        {[["all","All"],["pupils","Pupils"],["staff","Staff"],["parents","Parents"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:"8px 4px",borderRadius:"8px 8px 0 0",border:"none",background:tab===t?"#fff":"rgba(255,255,255,.4)",color:tab===t?C.maroon:"#555",fontWeight:tab===t?"bold":"normal",fontSize:12,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{width:"100%",maxWidth:480,background:"#fff",borderRadius:"0 0 16px 16px",overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.1)",marginBottom:14}}>
        {filtered.length===0 ? (
          <div style={{padding:"36px 20px",textAlign:"center",color:"#aaa"}}>
            <div style={{fontSize:38,marginBottom:8}}>📋</div>No scores yet — be the first!
          </div>
        ) : (
          filtered.map((e,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #f0f0f0",background:i%2===0?"#fff":"#fafafa"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:rankColor(i),display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:13,marginRight:10,flexShrink:0,color:i<3?"#333":"#999"}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:"bold",fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</div>
                <div style={{fontSize:10,color:"#999",marginTop:1}}>{e.cls} · {e.role} · {e.mode} · {e.size}×{e.size} · {e.date}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:"bold",fontSize:15,color:C.gold}}>{e.score}</div>
                <div style={{fontSize:10,color:"#aaa"}}>{e.steps}s · {fmtTime(e.time)}</div>
              </div>
            </div>
          ))
        )}
      </div>

      {(!JSONBIN_ID||!JSONBIN_KEY) && (
        <div style={{width:"100%",maxWidth:480,background:"#FFF9E6",border:"1px solid #F0C040",borderRadius:12,padding:"12px 14px",margin:"0 12px 14px",fontSize:11,color:"#7A5C00",lineHeight:1.8}}>
          <strong>📡 Enable cross-device leaderboard:</strong><br/>
          1. Sign up free at <strong>jsonbin.io</strong><br/>
          2. Create a Bin with content: <code style={{background:"#eee",padding:"1px 4px",borderRadius:3}}>{`{"leaderboard":[]}`}</code><br/>
          3. Paste your <strong>Bin ID</strong> and <strong>Master Key</strong> at the top of index.html
        </div>
      )}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
